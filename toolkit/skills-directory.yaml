# Skills Directory — published Michi toolkit on GitHub.
#
# This file is the public-facing version of the skills directory. It points
# at skills hosted under csepulv/michi on GitHub, so external users can fetch
# them with `agent-sync` (see https://github.com/csepulv/save-the-tokens).
#
# Pinning: all sources reference `main`. To pin to a release tag instead,
# replace `tree/main/` with `tree/v<version>/` in the source URL.
#
# Internally (in michi-private) the canonical file is
# `toolkit/skills-directory.yaml` with `source: custom`. Copybara replaces
# that file with this one at publish time.

